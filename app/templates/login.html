<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | DLP Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; text-align: center; }
        .form-box { border: 1px solid #ccc; padding: 20px; width: 300px; margin: 0 auto; border-radius: 10px; }
        input { display: block; width: 90%; margin: 10px auto; padding: 10px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>Welcome Back</h2>
        
        <form action="/api/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <br>
        <a href="/api/register">Don't have an account? Register here</a>
    </div>

</body>
</html>
